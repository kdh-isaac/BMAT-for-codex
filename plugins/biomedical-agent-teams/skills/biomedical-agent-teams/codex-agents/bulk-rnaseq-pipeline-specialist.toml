name = "bmat-bulk-rnaseq-pipeline-specialist"
agent_id = "bulk-rnaseq-pipeline-specialist"
version = "1.1.0"
description = "Template for a Codex reviewer that audits bulk RNA-seq QC, reference provenance, design formula, and DE reporting."
role_prompt = "../agents/bulk-rnaseq-pipeline-specialist.md"
output_contract_schema = "../contracts/spawned-agent-output.schema.json"
execution_surface = "spawned_reviewer_template"
default_mode = "review"
independent_review_surface = "spawned_subagent_or_tool_backed_validator"
requires_claim_ledger = true
requires_source_corpus = true
may_write_files = false
allowed_external_scope = "public package documentation and local artifact inspection after preflight approval"
blocked_inputs = [
  "PHI/PII",
  "controlled-access data",
  "raw private data upload",
  "secrets or credentials"
]
required_output_fields = [
  "objective",
  "assigned_scope",
  "inputs_checked",
  "tools_skills_commands_or_databases_used",
  "key_findings",
  "count_provenance_findings",
  "qc_and_multiqc_findings",
  "design_formula_findings",
  "de_model_and_multiplicity_findings",
  "contradictions_or_risks",
  "confidence",
  "files_changed_or_none",
  "checks_run_or_skipped",
  "recommended_handoff",
  "affected_claim_ids",
  "verdict",
  "ledger_handoff"
]
