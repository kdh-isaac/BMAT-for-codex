name = "bmat-meta-review-synthesizer"
agent_id = "meta-review-synthesizer"
version = "1.2.0"
description = "Template for a Codex reviewer that synthesizes cross-iteration tournament weaknesses and next-round generation guidance."
role_prompt = "../agents/meta-review-synthesizer.md"
output_contract_schema = "../contracts/spawned-agent-output.schema.json"
execution_surface = "spawned_reviewer_template"
default_mode = "review"
independent_review_policy = "../references/independent-review-policy.md"
review_manifest_schema = "../contracts/review-artifact-manifest.schema.json"
runtime_receipt_schema = "../contracts/review-runtime-receipt.schema.json"
independence_class_source = "runtime_receipt"
independent_review_eligibility_field = "independent_review_eligible"
full_protocol_eligible_independence_classes = ["separate-model", "external-tool", "human"]
supplementary_independence_classes = ["same-model-separate-context"]
non_independent_classes = ["same-model-self-review"]
spawn_event_is_independence_proof = false
input_output_runtime_hashes_required = true
authoring_identity_comparison_required = true
unknown_runtime_metadata_policy = "downgrade-not-fabricate"
requires_claim_ledger = true
requires_source_corpus = false
may_write_files = false
allowed_external_scope = "no external lookup by default; review provided tournament artifacts only"
blocked_inputs = [
  "PHI/PII",
  "controlled-access data",
  "unapproved private project details",
  "unapproved patent-sensitive search strategy"
]
required_output_fields = [
  "schema_version",
  "workflow_run_id",
  "plugin_version",
  "instance_id",
  "agent_id",
  "actor_type",
  "provider",
  "model",
  "model_version",
  "authoring_provider",
  "authoring_model",
  "authoring_model_version",
  "authoring_execution_session_id",
  "authoring_identity_available",
  "execution_surface",
  "execution_session_id",
  "spawn_event_id",
  "input_scope",
  "input_artifact_refs",
  "input_artifact_sha256",
  "prompt_template_ref",
  "prompt_template_sha256",
  "output_artifact",
  "output_sha256",
  "checks_run",
  "changed_claim_ids",
  "independence_class",
  "independent_review_eligible",
  "fixture_only",
  "authoring_context_shared",
  "started_at",
  "completed_at",
  "runtime_receipt_ref",
  "runtime_receipt_sha256",
  "limitations",
  "objective",
  "assigned_scope",
  "inputs_checked",
  "tools_skills_commands_or_databases_used",
  "key_findings",
  "recurring_weakness_patterns",
  "unsupported_claim_patterns",
  "novelty_vs_feasibility_tension",
  "contradiction_or_safety_patterns",
  "contradictions_or_risks",
  "generation_guidance_for_next_round",
  "ranking_sensitivity_notes",
  "research_overview",
  "stop_or_continue_recommendation",
  "confidence",
  "files_changed_or_none",
  "checks_run_or_skipped",
  "recommended_handoff",
  "affected_claim_ids",
  "verdict",
  "ledger_handoff"
]
