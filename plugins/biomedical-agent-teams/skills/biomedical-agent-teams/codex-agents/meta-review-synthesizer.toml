name = "bmat-meta-review-synthesizer"
agent_id = "meta-review-synthesizer"
version = "0.8.7"
description = "Template for a Codex reviewer that synthesizes cross-iteration tournament weaknesses and next-round generation guidance."
role_prompt = "../agents/meta-review-synthesizer.md"
output_contract_schema = "../contracts/spawned-agent-output.schema.json"
execution_surface = "spawned_reviewer_template"
default_mode = "review"
independent_review_surface = "spawned_subagent_or_tool_backed_validator"
requires_claim_ledger = true
requires_source_corpus = false
may_write_files = false
allowed_external_scope = "no external lookup by default; review provided tournament artifacts only"
blocked_inputs = [
  "PHI/PII",
  "controlled-access data",
  "unapproved private project details",
  "unapproved patent-sensitive search strategy"
]
required_output_fields = [
  "objective",
  "assigned_scope",
  "inputs_checked",
  "tools_skills_commands_or_databases_used",
  "key_findings",
  "recurring_weakness_patterns",
  "unsupported_claim_patterns",
  "novelty_vs_feasibility_tension",
  "contradiction_or_safety_patterns",
  "contradictions_or_risks",
  "generation_guidance_for_next_round",
  "ranking_sensitivity_notes",
  "research_overview",
  "stop_or_continue_recommendation",
  "confidence",
  "files_changed_or_none",
  "checks_run_or_skipped",
  "recommended_handoff",
  "affected_claim_ids",
  "verdict",
  "ledger_handoff"
]
