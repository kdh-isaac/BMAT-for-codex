name = "bmat-risk-of-bias-study-quality-auditor"
agent_id = "risk-of-bias-study-quality-auditor"
version = "1.2.0"
description = "Template for a Codex reviewer that grades study quality, bias risks, and evidence-strength inflation."
role_prompt = "../agents/risk-of-bias-study-quality-auditor.md"
