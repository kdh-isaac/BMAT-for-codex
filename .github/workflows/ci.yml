name: BMAT CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bmat-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  BMAT_ALLOW_LIVE_NETWORK: "0"
  BMAT_ALLOW_RAW_DATA_DOWNLOAD: "0"

jobs:
  ubuntu-full:
    name: Ubuntu full / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install validation dependencies
        run: python -m pip install "jsonschema>=4.18,<5" "pytest>=8,<9" "pytest-xdist>=3,<4" "tomli>=2,<3"

      - name: Check BOMs and compile Python without writing bytecode
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          bom_signatures = (
              b"\xef\xbb\xbf",
              b"\xff\xfe\x00\x00",
              b"\x00\x00\xfe\xff",
              b"\xff\xfe",
              b"\xfe\xff",
          )
          text_suffixes = {".json", ".jsonl", ".md", ".py", ".toml", ".txt", ".yaml", ".yml"}
          checked = 0
          compiled = 0
          for path in sorted(Path(".").rglob("*")):
              if not path.is_file() or ".git" in path.parts:
                  continue
              if path.name != "VERSION" and path.suffix.lower() not in text_suffixes:
                  continue
              payload = path.read_bytes()
              if payload.startswith(bom_signatures):
                  raise SystemExit(f"BOM detected: {path}")
              checked += 1
              if path.suffix.lower() == ".py":
                  compile(payload.decode("utf-8"), str(path), "exec")
                  compiled += 1
          print(f"BOM-free text files: {checked}; compiled Python files: {compiled}")
          PY

      - name: Package, manifest-count, and self-test gates
        run: |
          python -B plugins/biomedical-agent-teams/skills/biomedical-agent-teams/scripts/bmat_package_check.py --root plugins/biomedical-agent-teams
          python -B plugins/biomedical-agent-teams/skills/biomedical-agent-teams/scripts/bmat_selftest.py --root plugins/biomedical-agent-teams

      - name: Golden schema and strict offline gate
        run: |
          python -B plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/validate_golden_eval_schema.py --tasks plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/golden_tasks.jsonl --outputs plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/sample_outputs.jsonl
          python -B plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/run_golden_eval.py --tasks plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/golden_tasks.jsonl --outputs plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/sample_outputs.jsonl --strict --gate

      - name: Deterministic sample-model gate
        run: >-
          python -B plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/run_model_golden_eval.py
          --tasks plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/golden_tasks.jsonl
          --alias evidence-audit-team --runtime codex --model sample-model
          --out "${RUNNER_TEMP}/bmat-model-sample.jsonl"
          --sample-mode --then-score --gate

      - name: Metadata-only public omics smoke
        run: >-
          python -B plugins/biomedical-agent-teams/skills/biomedical-agent-teams/scripts/bmat_public_omics_benchmark_smoke.py
          --out "${RUNNER_TEMP}/bmat-public-omics"
          --validate --force

      - name: Release fixture gate
        run: >-
          python -B plugins/biomedical-agent-teams/skills/biomedical-agent-teams/scripts/bmat_validate.py
          --bundle plugins/biomedical-agent-teams/skills/biomedical-agent-teams/tests/fixtures/valid_full_protocol_bundle
          --release --json

      - name: Conservative v1 to v2 migration smoke
        run: >-
          python -B plugins/biomedical-agent-teams/skills/biomedical-agent-teams/scripts/bmat_migrate_bundle.py
          --source plugins/biomedical-agent-teams/skills/biomedical-agent-teams/tests/fixtures/valid_legacy_preflight_bundle
          --out "${RUNNER_TEMP}/bmat-migrated-v2"

      - name: Version residue and release-surface gates
        run: >-
          python -B -m pytest -p no:cacheprovider
          plugins/biomedical-agent-teams/skills/biomedical-agent-teams/tests/test_release_surface.py
          plugins/biomedical-agent-teams/skills/biomedical-agent-teams/tests/test_bmat_package_check.py
          -q

      - name: Full pytest suite
        run: >-
          python -B -m pytest -p no:cacheprovider -n auto
          tests
          plugins/biomedical-agent-teams/skills/biomedical-agent-teams/tests
          -q

      - name: Confirm tests did not dirty the checkout
        shell: bash
        run: |
          git diff --exit-code
          test -z "$(git status --porcelain)"

  windows-core:
    name: Windows core/path/CLI / Python ${{ matrix.python-version }}
    runs-on: windows-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install validation dependencies
        run: python -m pip install "jsonschema>=4.18,<5" "pytest>=8,<9" "tomli>=2,<3"

      - name: Package, manifest-count, and self-test gates
        shell: pwsh
        run: |
          python -B plugins/biomedical-agent-teams/skills/biomedical-agent-teams/scripts/bmat_package_check.py --root plugins/biomedical-agent-teams
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -B plugins/biomedical-agent-teams/skills/biomedical-agent-teams/scripts/bmat_selftest.py --root plugins/biomedical-agent-teams
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Windows CLI help surfaces
        shell: pwsh
        run: |
          $scripts = @(
            "bmat_validate.py",
            "bmat_run.py",
            "bmat_codex_adapter.py",
            "bmat_source_check.py",
            "bmat_claim_support_check.py",
            "bmat_bundle_manifest.py",
            "bmat_migrate_bundle.py"
          )
          $root = "plugins/biomedical-agent-teams/skills/biomedical-agent-teams/scripts"
          foreach ($script in $scripts) {
            python -B (Join-Path $root $script) --help | Out-Null
            if ($LASTEXITCODE -ne 0) { throw "$script --help failed with exit $LASTEXITCODE" }
          }

      - name: Windows path-with-spaces runner smoke
        shell: pwsh
        run: |
          $out = Join-Path $env:RUNNER_TEMP "BMAT path smoke"
          python -B plugins/biomedical-agent-teams/skills/biomedical-agent-teams/scripts/bmat_run.py --alias evidence-audit-team --mode standard --tier compact --question "Windows path and CLI smoke" --out $out --domain-pack generic-biomedical --dry-run --force
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path (Join-Path $out "run_state.json"))) { throw "run_state.json was not created" }
          python -B plugins/biomedical-agent-teams/skills/biomedical-agent-teams/scripts/bmat_validate.py --bundle $out --json | Out-Null
          $validatorExit = $LASTEXITCODE
          if ($validatorExit -notin @(0, 1)) { throw "validator path smoke failed with exit $validatorExit" }

      - name: Windows golden and focused regression gates
        shell: pwsh
        run: |
          python -B plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/validate_golden_eval_schema.py --tasks plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/golden_tasks.jsonl --outputs plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/sample_outputs.jsonl
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -B plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/run_golden_eval.py --tasks plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/golden_tasks.jsonl --outputs plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/sample_outputs.jsonl --strict --gate
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -B -m pytest -p no:cacheprovider plugins/biomedical-agent-teams/skills/biomedical-agent-teams/tests/test_bmat_init_bundle.py plugins/biomedical-agent-teams/skills/biomedical-agent-teams/tests/test_bmat_package_check.py -q
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Confirm tests did not dirty the checkout
        shell: pwsh
        run: |
          git diff --exit-code
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $status = git status --porcelain
          if ($status) { throw "CI commands modified the checkout" }
